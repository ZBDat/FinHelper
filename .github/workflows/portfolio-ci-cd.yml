name: portfolio-ci-cd

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  TARGET_HOST: 120.55.1.225
  TARGET_PORT: 22
  DEPLOY_PATH: /opt/finhelper

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: "3.11"

      - name: Syntax check
        run: |
          python -m py_compile portfolio_server.py get_gold_prices.py ui_train_server.py prep_script.py

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Prepare SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          mkdir -p ~/.ssh
          printf "%s" "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$TARGET_PORT" -H "$TARGET_HOST" >> ~/.ssh/known_hosts

      - name: Sync files to server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          test -n "$DEPLOY_USER"
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            -e "ssh -p $TARGET_PORT" \
            ./ "$DEPLOY_USER@$TARGET_HOST:$DEPLOY_PATH/"

      - name: Restart portfolio service
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -p "$TARGET_PORT" "$DEPLOY_USER@$TARGET_HOST" <<'EOF'
          set -e
          cd /opt/finhelper
          python3 -m py_compile portfolio_server.py
          pkill -f "python3 portfolio_server.py" || true
          for i in 1 2 3 4 5; do
            if ! pgrep -f "python3 portfolio_server.py" >/dev/null; then
              break
            fi
            sleep 1
          done
          nohup python3 portfolio_server.py --host 0.0.0.0 --port 8877 > portfolio_server.log 2>&1 &
          EOF
